[project]
name = "cx-wealth"
version = "0.7.5"
description = "Cxalio Rich UI component library — declarative CLI interface components for terminal applications."
readme = "README.md"
authors = [{ name = "xiii_1991", email = "xiii_1991@163.com" }]
requires-python = ">=3.12,<3.15"
dependencies = ["rich>=14.0.0"]

[project.scripts]
cx-wealth = "cx_wealth:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.hatch.build.targets.wheel]
include = ["cx_wealth/locales/**/*.mo"]
