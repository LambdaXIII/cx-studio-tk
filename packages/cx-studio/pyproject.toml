[project]
name = "cx-studio"
version = "0.8.0.1"
description = "Cxalio infrastructure library — core abstractions and utilities for post-production tooling."
readme = "README.md"
requires-python = ">=3.12,<3.15"
dependencies = [
    "chardet>=5.2.0",
    "lazy-object-proxy>=1.10.0",
    "pyee>=13.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


[tool.hatch.build.targets.wheel]
packages = ["cx_studio"]
include = ["cx_studio/locales/**/*.mo"]
