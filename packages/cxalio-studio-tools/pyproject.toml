[project]
name = "cxalio-studio-tools"
version = "0.8.1"
description = "Cxalio CLI toolkit — practical tools for media post-production workflows and easy system administration."
readme = "README.md"
requires-python = ">=3.12,<3.15"
dependencies = [
    "cachetools>=5.5.2",
    "cx-studio",
    "cx-wealth",
    "pillow>=11.2.1",
    "python-box[all]~=7.0",
    "rich>=14.0.0",
    "ulid-py>=1.1.0",
]

[project.scripts]
mediakiller = "media_killer:run"
mediascout = "media_scout:run"
ffpretty = "ffpretty:run"
jpegger = "jpegger:run"
hostskeeper = "hosts_keeper:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "cx_tools",
    "media_killer",
    "media_scout",
    "ffpretty",
    "jpegger",
    "hosts_keeper",
]
include = ["cx_tools/locales/**/*.mo"]

[dependency-groups]
dev = ["types-cachetools>=5.5.0.20240820"]

[tool.basedpyright]
reportUnknownMemberType = "none"
reportExplicitAny = "none"
